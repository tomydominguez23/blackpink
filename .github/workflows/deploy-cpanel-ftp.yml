# Despliegue automático del sitio estático + PHP (Webpay) hacia cPanel por FTP/FTPS.
# Configura los secretos en GitHub: ver DEPLOY_CPANEL.md

name: Deploy a cPanel (FTP)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-cpanel-ftp-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Subir archivos por FTP
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Obtener código
        uses: actions/checkout@v4

      - name: Generar api/webpay/config.php (secretos Supabase/Webpay)
        run: php scripts/generate-webpay-config.php
        env:
          SITE_URL: https://bpphones.cl
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          WEBPAY_MODE: ${{ secrets.WEBPAY_MODE }}
          WEBPAY_COMMERCE_CODE: ${{ secrets.WEBPAY_COMMERCE_CODE }}
          WEBPAY_API_KEY_SECRET: ${{ secrets.WEBPAY_API_KEY_SECRET }}
          SHIPPING_CLP: ${{ secrets.SHIPPING_CLP }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          ADMIN_ALERT_EMAIL: ${{ secrets.ADMIN_ALERT_EMAIL }}

      - name: Subir config.php Webpay (si se generó)
        if: hashFiles('api/webpay/config.php') != ''
        run: bash scripts/upload-webpay-config-ftp.sh
        env:
          CPANEL_FTP_SERVER: ${{ secrets.CPANEL_FTP_SERVER }}
          CPANEL_FTP_USERNAME: ${{ secrets.CPANEL_FTP_USERNAME }}
          CPANEL_FTP_PASSWORD: ${{ secrets.CPANEL_FTP_PASSWORD }}
          CPANEL_FTP_PORT: ${{ secrets.CPANEL_FTP_PORT }}
          CPANEL_FTP_SERVER_DIR: ${{ secrets.CPANEL_FTP_SERVER_DIR }}

      - name: Limpiar estado FTP (subida completa al cambiar carpeta)
        run: bash scripts/clear-ftp-sync-state.sh
        env:
          CPANEL_FTP_SERVER: ${{ secrets.CPANEL_FTP_SERVER }}
          CPANEL_FTP_USERNAME: ${{ secrets.CPANEL_FTP_USERNAME }}
          CPANEL_FTP_PASSWORD: ${{ secrets.CPANEL_FTP_PASSWORD }}
          CPANEL_FTP_PORT: ${{ secrets.CPANEL_FTP_PORT }}
          CPANEL_FTP_SERVER_DIR: ${{ secrets.CPANEL_FTP_SERVER_DIR }}

      - name: Sincronizar con public_html/bpphones.cl (cPanel)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.CPANEL_FTP_SERVER }}
          username: ${{ secrets.CPANEL_FTP_USERNAME }}
          password: ${{ secrets.CPANEL_FTP_PASSWORD }}
          protocol: ftps
          port: ${{ secrets.CPANEL_FTP_PORT != '' && secrets.CPANEL_FTP_PORT || '21' }}
          local-dir: ./
          server-dir: ${{ secrets.CPANEL_FTP_SERVER_DIR != '' && secrets.CPANEL_FTP_SERVER_DIR || './public_html/bpphones.cl/' }}
          state-name: .ftp-deploy-sync-bpphones.json
          log-level: standard
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            **/.ftp-deploy-sync-state.json
            **/api/webpay/config.php
            **/config.js
            **/*.sql
            supabase-migration-*.sql
            supabase-schema.sql
            SUPABASE_EJECUTAR*.sql
            **/tests/**
            **/*.test.mjs
            **/smoke.test.mjs
            **/package.json
            **/package-lock.json
            **/config.toml
            **/index.ts
            **/cli-latest
            **/gotrue-version
            **/pooler-url
            **/postgres-version
            **/project-ref
            **/rest-version
            **/storage-migration
            **/storage-version
            **/WEBPAY_PHP_SETUP.md
            **/DEPLOY_CPANEL.md
