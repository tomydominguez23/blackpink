# Despliegue automático del sitio estático + PHP (Webpay) hacia cPanel por FTP/FTPS.
# Secretos: ver DEPLOY_CPANEL.md

name: Deploy a cPanel (FTP)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-cpanel-ftp-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Subir archivos por FTP
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Obtener código
        uses: actions/checkout@v4

      - name: Resolver carpeta remota FTP
        id: ftpdir
        env:
          FTP_USER: ${{ secrets.CPANEL_FTP_USERNAME }}
        run: |
          # Docroot del dominio en cPanel:
          #   /home/ditecnoc/public_html/bpphones.cl
          # Cuenta admin@bpphones.cl: al conectar por FTP la sesión YA está en esa carpeta → usar solo ./
          ABS_DOCROOT="/home/ditecnoc/public_html/bpphones.cl"
          DIR="${{ secrets.CPANEL_FTP_SERVER_DIR }}"
          IS_BPPHONES_ACCOUNT=0
          if echo "$FTP_USER" | grep -qi 'bpphones\.cl'; then
            IS_BPPHONES_ACCOUNT=1
          fi
          if [ -z "$DIR" ]; then
            if [ "$IS_BPPHONES_ACCOUNT" -eq 1 ]; then
              DIR="./"
            else
              DIR="./public_html/bpphones.cl/"
            fi
          fi
          DIR="${DIR#/home/ditecnoc/}"
          DIR="${DIR#/home/ditecnoc}"
          case "$DIR" in
            /|./|./|""|".")
              DIR="./"
              ;;
            public_html/bpphones.cl|public_html/bpphones.cl/*|./public_html/bpphones.cl|./public_html/bpphones.cl/*)
              if [ "$IS_BPPHONES_ACCOUNT" -eq 1 ]; then
                echo "::warning::CPANEL_FTP_SERVER_DIR=${DIR} pero admin@bpphones.cl ya está en ${ABS_DOCROOT}. Se usa ./ (evita subcarpeta public_html/bpphones.cl duplicada)."
                DIR="./"
              else
                DIR="./public_html/bpphones.cl/"
              fi
              ;;
            bpphones.cl|bpphones.cl/*|./bpphones.cl|./bpphones.cl/*)
              if [ "$IS_BPPHONES_ACCOUNT" -eq 1 ]; then
                DIR="./"
              else
                DIR="./public_html/bpphones.cl/"
              fi
              ;;
            ./public_html/|public_html/|./public_html|public_html)
              echo "::error::No uses solo public_html/. Para admin@bpphones.cl deja CPANEL_FTP_SERVER_DIR vacío o usa ./"
              exit 1
              ;;
            *)
              if [ "$IS_BPPHONES_ACCOUNT" -eq 1 ]; then
                echo "::warning::Ruta FTP no reconocida (${DIR}); con admin@bpphones.cl se fuerza ./ → ${ABS_DOCROOT}"
                DIR="./"
              fi
              ;;
          esac
          case "$DIR" in
            ./*|./) ;;
            *) DIR="./${DIR}" ;;
          esac
          case "$DIR" in */) ;; *) DIR="${DIR}/" ;; esac
          {
            echo "dir<<FTPSERVERDIR"
            echo "$DIR"
            echo "FTPSERVERDIR"
            echo "abs_docroot<<ABS_DOCROOT"
            echo "$ABS_DOCROOT"
            echo "ABS_DOCROOT"
          } >> "$GITHUB_OUTPUT"
          echo "Usuario FTP: ${FTP_USER:-'(secreto)'}"
          echo "Carpeta remota FTP (relativa a la sesión): ${DIR}"
          echo "Docroot absoluto del dominio: ${ABS_DOCROOT}"
          if [ "$DIR" = "./" ] && [ "$IS_BPPHONES_ACCOUNT" -eq 1 ]; then
            echo "OK: admin@bpphones.cl + ./ = archivos en ${ABS_DOCROOT}"
          elif [ "$DIR" = "./public_html/bpphones.cl/" ]; then
            echo "OK: cuenta principal → ${ABS_DOCROOT}"
          else
            echo "::warning::Revisá CPANEL_FTP_SERVER_DIR en GitHub Secrets (recomendado: vacío o ./ para admin@bpphones.cl)"
          fi

      - name: Reparar servidor FTP (api.zip, PHP sueltos, .htaccess)
        continue-on-error: true
        run: bash scripts/fix-ftp-server-layout.sh
        env:
          CPANEL_FTP_SERVER: ${{ secrets.CPANEL_FTP_SERVER }}
          CPANEL_FTP_USERNAME: ${{ secrets.CPANEL_FTP_USERNAME }}
          CPANEL_FTP_PASSWORD: ${{ secrets.CPANEL_FTP_PASSWORD }}
          CPANEL_FTP_PORT: ${{ secrets.CPANEL_FTP_PORT }}
          CPANEL_FTP_SERVER_DIR: ${{ steps.ftpdir.outputs.dir }}

      - name: Generar api/webpay/config.php (secretos Supabase/Webpay)
        run: php scripts/generate-webpay-config.php
        env:
          SITE_URL: https://bpphones.cl
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          WEBPAY_MODE: ${{ secrets.WEBPAY_MODE }}
          WEBPAY_COMMERCE_CODE: ${{ secrets.WEBPAY_COMMERCE_CODE }}
          WEBPAY_API_KEY_SECRET: ${{ secrets.WEBPAY_API_KEY_SECRET }}
          SHIPPING_CLP: ${{ secrets.SHIPPING_CLP }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          ADMIN_ALERT_EMAIL: ${{ secrets.ADMIN_ALERT_EMAIL }}

      - name: Generar deploy-version.json (marcador visible del deploy)
        run: bash scripts/write-deploy-version.sh
        env:
          DEPLOY_ABS_DOCROOT: ${{ steps.ftpdir.outputs.abs_docroot }}
          DEPLOY_FTP_REMOTE_DIR: ${{ steps.ftpdir.outputs.dir }}

      - name: Generar deploy-ftp-check.json (ruta FTP usada)
        run: bash scripts/write-deploy-ftp-check.sh
        env:
          DEPLOY_ABS_DOCROOT: ${{ steps.ftpdir.outputs.abs_docroot }}
          DEPLOY_FTP_REMOTE_DIR: ${{ steps.ftpdir.outputs.dir }}

      - name: Versionar CSS/JS en HTML (cache bust móvil)
        run: bash scripts/bump-asset-cache.sh

      - name: Verificar bump en HTML antes del FTP
        run: |
          SHORT="${GITHUB_SHA:0:7}"
          for f in index.html productos.html producto.html carrito.html; do
            if [ ! -f "$f" ]; then
              echo "::error::Falta $f"
              exit 1
            fi
          done
          if ! grep -q "app.js?v=${SHORT}" index.html; then
            echo "::error::bump-asset-cache no actualizó app.js en index.html (esperado ?v=${SHORT})"
            exit 1
          fi
          if ! grep -q "productos-page.js?v=${SHORT}" productos.html; then
            echo "::error::bump-asset-cache no actualizó productos-page.js (esperado ?v=${SHORT})"
            exit 1
          fi
          echo "OK: HTML versionado con commit ${SHORT} antes del FTP."

      - name: Subir config.php Webpay (si se generó)
        if: hashFiles('api/webpay/config.php') != ''
        continue-on-error: true
        run: bash scripts/upload-webpay-config-ftp.sh
        env:
          CPANEL_FTP_SERVER: ${{ secrets.CPANEL_FTP_SERVER }}
          CPANEL_FTP_USERNAME: ${{ secrets.CPANEL_FTP_USERNAME }}
          CPANEL_FTP_PASSWORD: ${{ secrets.CPANEL_FTP_PASSWORD }}
          CPANEL_FTP_PORT: ${{ secrets.CPANEL_FTP_PORT }}
          CPANEL_FTP_SERVER_DIR: ${{ steps.ftpdir.outputs.dir }}

      - name: Limpiar estado FTP (forzar subida completa)
        run: bash scripts/clear-ftp-sync-state.sh
        env:
          CPANEL_FTP_SERVER: ${{ secrets.CPANEL_FTP_SERVER }}
          CPANEL_FTP_USERNAME: ${{ secrets.CPANEL_FTP_USERNAME }}
          CPANEL_FTP_PASSWORD: ${{ secrets.CPANEL_FTP_PASSWORD }}
          CPANEL_FTP_PORT: ${{ secrets.CPANEL_FTP_PORT }}
          CPANEL_FTP_SERVER_DIR: ${{ steps.ftpdir.outputs.dir }}

      - name: Subir sitio a bpphones.cl (FTPS)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.CPANEL_FTP_SERVER }}
          username: ${{ secrets.CPANEL_FTP_USERNAME }}
          password: ${{ secrets.CPANEL_FTP_PASSWORD }}
          protocol: ftps
          port: ${{ secrets.CPANEL_FTP_PORT != '' && secrets.CPANEL_FTP_PORT || '21' }}
          local-dir: ./
          server-dir: ${{ steps.ftpdir.outputs.dir }}
          state-name: .ftp-deploy-sync-bpphones-v8.json
          log-level: standard
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/__MACOSX/**
            **/node_modules/**
            **/scripts/**
            **/.ftp-deploy-sync-state.json
            **/config.js
            **/*.sql
            **/*.sh
            supabase-migration-*.sql
            supabase-schema.sql
            SUPABASE_EJECUTAR*.sql
            **/tests/**
            **/*.test.mjs
            **/smoke.test.mjs
            **/package.json
            **/package-lock.json
            **/config.toml
            **/index.ts
            **/cli-latest
            **/gotrue-version
            **/pooler-url
            **/postgres-version
            **/project-ref
            **/rest-version
            **/storage-migration
            **/storage-version
            **/WEBPAY_PHP_SETUP.md
            **/DEPLOY_CPANEL.md

      - name: Verificar sitio en vivo tras deploy
        run: bash scripts/verify-deploy-live.sh
